version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: erp-facilite-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: erp_root_password
      MYSQL_DATABASE: erp_facilite_v2
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # O schema.sql será executado automaticamente na primeira vez que o banco subir!
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  erp-app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: erp-facilite-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=https://erp.facilitedigital.com
      - NEXT_PUBLIC_WS_URL=https://erp.facilitedigital.com:3001
      - INTERNAL_WS_URL=http://erp-ws:3001/emit
      - MYSQL_HOST=db
      - MYSQL_USER=erp_user
      - MYSQL_PASSWORD=erp_password
      - MYSQL_DATABASE=erp_facilite_v2
      - JWT_SECRET=chave_super_segura_erp_facilite_123

  erp-ws:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: erp-facilite-ws
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - db
    command: ["node", "server/ws.js"]
    environment:
      - NEXT_PUBLIC_APP_URL=https://erp.facilitedigital.com

volumes:
  db_data:
